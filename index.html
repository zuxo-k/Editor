<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
  <title>CodeEditor Pro</title>
  <!-- Font Awesome 6 (free) -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <!-- SweetAlert2 -->
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <!-- Inline CSS (iOS design system) -->
  <style>
    /* CSS variables – light mode default */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
      font-family: -apple-system, BlinkMacSystemFont, "San Francisco", "Segoe UI", Roboto, system-ui, sans-serif;
    }

    body {
      --bg: #ffffff;
      --card: #f2f2f7;
      --text: #000000;
      --accent: #007aff;
      --border: rgba(0,0,0,0.1);
      --header-blur: rgba(255,255,255,0.8);
      transition: background-color 0.3s ease, color 0.2s ease;
      background-color: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    body.dark-mode {
      --bg: #000000;
      --card: #1c1c1e;
      --text: #ffffff;
      --accent: #0a84ff;
      --border: rgba(255,255,255,0.15);
      --header-blur: rgba(28,28,30,0.9);
    }

    /* SPLASH SCREEN */
    #splash {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-color: var(--bg);
      z-index: 2000;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      transition: opacity 0.8s cubic-bezier(0.2, 0.9, 0.3, 1);
      pointer-events: none;
      backdrop-filter: blur(0);
    }
    #splash.fade-out {
      opacity: 0;
    }
    .splash-content {
      text-align: center;
      animation: pulse 1.5s infinite ease-in-out;
    }
    .splash-content h1 {
      font-size: 2.2rem;
      font-weight: 600;
      letter-spacing: -0.02em;
      background: linear-gradient(145deg, var(--accent), #5e5ce0);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 1rem;
    }
    .splash-dots {
      display: flex;
      gap: 0.6rem;
      justify-content: center;
      margin-top: 1.5rem;
    }
    .splash-dots span {
      width: 12px;
      height: 12px;
      background: var(--accent);
      border-radius: 30px;
      opacity: 0.5;
      animation: dotPulse 1.4s infinite;
    }
    .splash-dots span:nth-child(2) { animation-delay: 0.2s; }
    .splash-dots span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes pulse { 0% { opacity: 0.8; transform: scale(1); } 50% { opacity: 1; transform: scale(1.02); } 100% { opacity: 0.8; transform: scale(1); } }
    @keyframes dotPulse { 0%,100% { opacity: 0.3; transform: scale(1); } 50% { opacity: 1; transform: scale(1.2); } }

    /* MAIN APP (hidden until splash fades) */
    #app {
      display: none;
      flex: 1;
      flex-direction: column;
      opacity: 0;
      animation: appFadeIn 0.5s ease forwards;
    }
    @keyframes appFadeIn { to { opacity: 1; } }

    /* iOS header */
    .app-header {
      position: sticky;
      top: 0;
      z-index: 100;
      background: var(--header-blur);
      backdrop-filter: blur(20px) saturate(180%);
      -webkit-backdrop-filter: blur(20px) saturate(180%);
      padding: 0.8rem 1.2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid var(--border);
      box-shadow: 0 2px 12px rgba(0,0,0,0.03);
    }
    .app-header h2 {
      font-size: 1.5rem;
      font-weight: 590;
      background: linear-gradient(145deg, var(--accent), #5856d6);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      letter-spacing: -0.02em;
    }
    .header-actions {
      display: flex;
      gap: 1rem;
      align-items: center;
    }
    .icon-btn {
      background: var(--card);
      border: none;
      border-radius: 30px;
      width: 44px;
      height: 44px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--accent);
      font-size: 1.4rem;
      cursor: pointer;
      transition: all 0.15s ease;
      box-shadow: 0 2px 8px rgba(0,0,0,0.03);
      -webkit-touch-callout: none;
    }
    .icon-btn:active {
      transform: scale(0.94);
      background: var(--accent);
      color: white;
    }
    .icon-btn i { pointer-events: none; }

    /* Editor cards */
    .editor-container {
      padding: 1.2rem;
      display: flex;
      flex-direction: column;
      gap: 1.4rem;
      flex: 1;
    }
    .editor-card {
      background: var(--card);
      border-radius: 22px;
      padding: 1.2rem 1rem 0.8rem 1rem;
      box-shadow: 0 8px 18px rgba(0,0,0,0.05), 0 2px 4px rgba(0,0,0,0.02);
      backdrop-filter: blur(5px);
      transition: background 0.2s;
      border: 1px solid var(--border);
    }
    .editor-label {
      font-size: 0.9rem;
      font-weight: 600;
      letter-spacing: 0.02em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 0.5rem;
      margin-left: 0.3rem;
    }
    .editor-card textarea {
      width: 100%;
      min-height: 150px;
      background: var(--bg);
      border: none;
      border-radius: 16px;
      padding: 1rem;
      font-family: 'SF Mono', 'Menlo', 'Courier New', monospace;
      font-size: 0.9rem;
      line-height: 1.5;
      color: var(--text);
      resize: vertical;
      outline: 1px solid var(--border);
      transition: outline 0.1s, background 0.2s;
      box-shadow: inset 0 2px 6px rgba(0,0,0,0.02);
    }
    .editor-card textarea:focus {
      outline: 2px solid var(--accent);
    }

    /* Fullscreen preview modal */
    #preview-modal {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: var(--bg);
      z-index: 1500;
      display: none;
      flex-direction: column;
      opacity: 0;
      transition: opacity 0.25s ease;
      pointer-events: none;
    }
    #preview-modal.show {
      display: flex;
      opacity: 1;
      pointer-events: auto;
    }
    .preview-header {
      padding: 0.8rem 1.2rem;
      display: flex;
      justify-content: flex-end;
      background: var(--header-blur);
      backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border);
    }
    .close-preview {
      background: var(--card);
      border: none;
      border-radius: 30px;
      width: 44px;
      height: 44px;
      font-size: 1.5rem;
      color: var(--accent);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .preview-iframe {
      flex: 1;
      width: 100%;
      border: none;
      background: white;
    }

    /* utility */
    .hidden { display: none; }
  </style>
</head>
<body class="light-mode">

  <!-- SPLASH SCREEN -->
  <div id="splash">
    <div class="splash-content">
      <h1>CodeEditor Pro</h1>
      <div class="splash-dots">
        <span></span><span></span><span></span>
      </div>
    </div>
  </div>

  <!-- MAIN APP -->
  <div id="app">
    <header class="app-header">
      <h2>CodeEditor Pro</h2>
      <div class="header-actions">
        <button class="icon-btn" id="themeToggle" aria-label="Toggle theme"><i class="fas fa-sun"></i></button>
        <button class="icon-btn" id="runBtn" aria-label="Run code"><i class="fas fa-play"></i></button>
        <button class="icon-btn" id="resetBtn" aria-label="Reset editors"><i class="fas fa-undo-alt"></i></button>
      </div>
    </header>

    <div class="editor-container">
      <!-- HTML Editor -->
      <div class="editor-card">
        <div class="editor-label">HTML</div>
        <textarea id="htmlEditor" placeholder="<!-- HTML here -->" spellcheck="false"><h1>Hello, world!</h1></textarea>
      </div>
      <!-- CSS Editor -->
      <div class="editor-card">
        <div class="editor-label">CSS</div>
        <textarea id="cssEditor" placeholder="/* CSS here */" spellcheck="false">h1 { color: #007aff; }</textarea>
      </div>
      <!-- JavaScript Editor -->
      <div class="editor-card">
        <div class="editor-label">JavaScript</div>
        <textarea id="jsEditor" placeholder="// JavaScript here" spellcheck="false">console.log('ready');</textarea>
      </div>
    </div>
  </div>

  <!-- FULLSCREEN PREVIEW MODAL -->
  <div id="preview-modal">
    <div class="preview-header">
      <button class="close-preview" id="closePreview"><i class="fas fa-xmark"></i></button>
    </div>
    <iframe class="preview-iframe" id="previewFrame" sandbox="allow-scripts allow-forms allow-same-origin"></iframe>
  </div>

  <!-- MANIFEST (data URL) -->
  <link rel="manifest" id="manifest" href="data:application/manifest+json,%7B%22name%22%3A%22CodeEditor%20Pro%22%2C%22short_name%22%3A%22Editor%22%2C%22display%22%3A%22standalone%22%2C%22start_url%22%3A%22.%22%2C%22theme_color%22%3A%22%23007aff%22%2C%22background_color%22%3A%22%23ffffff%22%2C%22icons%22%3A%5B%7B%22src%22%3A%22data%3Aimage%2Fsvg%2Bxml%2C%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20width%3D%22192%22%20height%3D%22192%22%20viewBox%3D%220%200%20100%20100%22%3E%3Crect%20width%3D%22100%22%20height%3D%22100%22%20rx%3D%2220%22%20fill%3D%22%23007aff%22%2F%3E%3Ctext%20x%3D%2220%22%20y%3D%2270%22%20font-size%3D%2260%22%20fill%3D%22white%22%20font-family%3D%22Arial%22%3EC%3C%2Ftext%3E%3C%2Fsvg%3E%22%2C%22sizes%22%3A%22192x192%22%2C%22type%22%3A%22image%2Fsvg%2Bxml%22%7D%2C%7B%22src%22%3A%22data%3Aimage%2Fsvg%2Bxml%2C%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20width%3D%22512%22%20height%3D%22512%22%20viewBox%3D%220%200%20100%20100%22%3E%3Crect%20width%3D%22100%22%20height%3D%22100%22%20rx%3D%2220%22%20fill%3D%22%23007aff%22%2F%3E%3Ctext%20x%3D%2220%22%20y%3D%2270%22%20font-size%3D%2260%22%20fill%3D%22white%22%20font-family%3D%22Arial%22%3EC%3C%2Ftext%3E%3C%2Fsvg%3E%22%2C%22sizes%22%3A%22512x512%22%2C%22type%22%3A%22image%2Fsvg%2Bxml%22%7D%5D%7D">

  <script>
    (function() {
      "use strict";

      // ----- DOM elements -----
      const splash = document.getElementById('splash');
      const app = document.getElementById('app');
      const themeToggle = document.getElementById('themeToggle');
      const runBtn = document.getElementById('runBtn');
      const resetBtn = document.getElementById('resetBtn');
      const htmlEditor = document.getElementById('htmlEditor');
      const cssEditor = document.getElementById('cssEditor');
      const jsEditor = document.getElementById('jsEditor');
      const previewModal = document.getElementById('preview-modal');
      const previewFrame = document.getElementById('previewFrame');
      const closePreview = document.getElementById('closePreview');
      const themeIcon = themeToggle.querySelector('i');

      // ----- Splash screen (1500ms) -----
      setTimeout(() => {
        splash.classList.add('fade-out');
        setTimeout(() => {
          splash.style.display = 'none';
          app.style.display = 'flex';
        }, 800); // match fade-out duration
      }, 1600); // 1.6s visible

      // ----- Theme management (light/dark) -----
      const body = document.body;
      let isDark = localStorage.getItem('codeEditorTheme') === 'dark';

      function setTheme(dark) {
        if (dark) {
          body.classList.add('dark-mode');
          themeIcon.className = 'fas fa-moon';
          localStorage.setItem('codeEditorTheme', 'dark');
        } else {
          body.classList.remove('dark-mode');
          themeIcon.className = 'fas fa-sun';
          localStorage.setItem('codeEditorTheme', 'light');
        }
        isDark = dark;
      }
      setTheme(isDark);

      themeToggle.addEventListener('click', () => {
        setTheme(!isDark);
      });

      // ----- Run button: generate preview in iframe (full screen modal) -----
      function generatePreviewHTML() {
        const html = htmlEditor.value;
        const css = cssEditor.value;
        const js = jsEditor.value;
        return `
          <!DOCTYPE html>
          <html>
          <head><meta charset="UTF-8"><style>${css}</style></head>
          <body>${html}</body>
          <script>${js}<\/script>
          </html>
        `;
      }

      runBtn.addEventListener('click', () => {
        const srcdoc = generatePreviewHTML();
        previewFrame.srcdoc = srcdoc;
        previewModal.classList.add('show');
      });

      closePreview.addEventListener('click', () => {
        previewModal.classList.remove('show');
        // clear iframe content to stop any running scripts?
        previewFrame.srcdoc = '';
      });

      // ----- Reset with SweetAlert2 confirmation -----
      resetBtn.addEventListener('click', () => {
        Swal.fire({
          title: 'Reset editors?',
          text: 'All your code will be lost.',
          icon: 'warning',
          showCancelButton: true,
          confirmButtonColor: '#007aff',
          cancelButtonColor: '#8e8e93',
          confirmButtonText: 'Yes, reset',
          background: body.classList.contains('dark-mode') ? '#1c1c1e' : '#f2f2f7',
          color: body.classList.contains('dark-mode') ? '#fff' : '#000'
        }).then((result) => {
          if (result.isConfirmed) {
            htmlEditor.value = '';
            cssEditor.value = '';
            jsEditor.value = '';
          }
        });
      });

      // ----- PWA: Service Worker registration via Blob -----
      if ('serviceWorker' in navigator) {
        // Create service worker code as a string (simple cache-first)
        const swCode = `
          self.addEventListener('install', event => {
            event.waitUntil(
              caches.open('code-editor-v1').then(cache => {
                return cache.addAll(['./']); // cache the current page (root)
              })
            );
            self.skipWaiting();
          });
          self.addEventListener('activate', event => {
            event.waitUntil(clients.claim());
          });
          self.addEventListener('fetch', event => {
            event.respondWith(
              caches.match(event.request).then(response => {
                return response || fetch(event.request);
              })
            );
          });
        `;

        try {
          const blob = new Blob([swCode], { type: 'application/javascript' });
          const blobUrl = URL.createObjectURL(blob);
          navigator.serviceWorker.register(blobUrl, { scope: './' })
            .then(reg => console.log('✅ Service Worker registered (blob)'))
            .catch(err => console.warn('⚠️ SW registration failed (expected on file://)', err));
        } catch (e) {
          console.warn('SW blob registration error', e);
        }
      }

      // ----- Additional: ensure preview modal background adapts to theme -----
      // (no action needed, CSS variables handle it)

      // ----- Ensure iframe updates theme on dark/light switch (no direct effect) -----

      // ----- smooth press feedback (already in CSS .icon-btn:active) -----

      // ----- localStorage already set, everything smooth -----

      // ----- iOS/Android touch friendly -----
      // All buttons have 44px height

      // ----- final: set initial editors to some demo content if empty? Already set.

      // On manual theme change, update swal background for next time? not necessary

      // Also handle preview close with Escape key (optional)
      document.addEventListener('keydown', (e) => {
        if (e.key === 'Escape' && previewModal.classList.contains('show')) {
          previewModal.classList.remove('show');
          previewFrame.srcdoc = '';
        }
      });

    })();
  </script>

  <!-- ensure splash disappears if timeout somehow missed (backup) -->
  <noscript>JavaScript required</noscript>
</body>
</html>
