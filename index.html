<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#ffffff" id="meta-theme-color">
    <title>CodeEditor Pro</title>
    
    <!-- SweetAlert2 CDN -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <style>
        :root {
            --bg: #ffffff;
            --card: #f2f2f7;
            --text: #000000;
            --accent: #007aff;
            --border: #e5e5ea;
            --header-bg: rgba(255, 255, 255, 0.8);
            --danger: #ff3b30;
            --shadow: 0 4px 12px rgba(0, 0, 0, 0.05);
        }

        [data-theme="dark"] {
            --bg: #000000;
            --card: #1c1c1e;
            --text: #ffffff;
            --accent: #0a84ff;
            --border: #38383a;
            --header-bg: rgba(0, 0, 0, 0.8);
            --danger: #ff453a;
            --shadow: 0 4px 12px rgba(0, 0, 0, 0.5);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "San Francisco", "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            transition: background-color 0.3s ease, color 0.3s ease;
            overscroll-behavior-y: none;
        }

        /* Splash Screen */
        #splash-screen {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: var(--bg);
            z-index: 9999;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            transition: opacity 0.5s ease, visibility 0.5s ease;
        }
        
        #splash-screen.hidden {
            opacity: 0;
            visibility: hidden;
        }

        .splash-title {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 20px;
            color: var(--text);
            letter-spacing: -0.5px;
        }

        .loader {
            display: flex;
            gap: 8px;
        }

        .loader span {
            width: 12px;
            height: 12px;
            background-color: var(--accent);
            border-radius: 50%;
            animation: pulse 1.5s infinite ease-in-out;
        }

        .loader span:nth-child(1) { animation-delay: -0.3s; }
        .loader span:nth-child(2) { animation-delay: -0.15s; }

        @keyframes pulse {
            0%, 80%, 100% { transform: scale(0); opacity: 0.5; }
            40% { transform: scale(1); opacity: 1; }
        }

        /* Header */
        header {
            position: sticky;
            top: 0;
            z-index: 1000;
            background: var(--header-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            padding: calc(env(safe-area-inset-top) + 16px) 20px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border);
            transition: background-color 0.3s ease, border-color 0.3s ease;
        }

        .logo {
            font-size: 20px;
            font-weight: 600;
            letter-spacing: -0.5px;
        }

        .header-actions {
            display: flex;
            gap: 12px;
            align-items: center;
        }

        button {
            border: none;
            outline: none;
            cursor: pointer;
            font-family: inherit;
            font-size: 15px;
            font-weight: 600;
            border-radius: 16px;
            padding: 8px 16px;
            transition: transform 0.2s ease, background-color 0.2s ease, opacity 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        button:active {
            transform: scale(0.95);
        }

        .btn-primary {
            background-color: var(--accent);
            color: #ffffff;
        }

        .btn-secondary {
            background-color: var(--card);
            color: var(--danger);
        }

        .icon-btn {
            background: transparent;
            padding: 8px;
            color: var(--text);
            border-radius: 50%;
        }
        
        .icon-btn svg {
            width: 24px;
            height: 24px;
            fill: currentColor;
        }

        /* Main Editor Area */
        main {
            padding: 20px;
            padding-bottom: calc(env(safe-area-inset-bottom) + 20px);
            display: flex;
            flex-direction: column;
            gap: 20px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .editor-section {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .editor-label {
            font-size: 14px;
            font-weight: 600;
            color: var(--text);
            margin-left: 4px;
            opacity: 0.8;
        }

        textarea {
            width: 100%;
            height: 220px;
            background-color: var(--card);
            color: var(--text);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 16px;
            font-family: ui-monospace, SFMono-Regular, Consolas, "Liberation Mono", Menlo, monospace;
            font-size: 14px;
            line-height: 1.5;
            resize: vertical;
            box-shadow: var(--shadow);
            transition: background-color 0.3s ease, color 0.3s ease, border-color 0.3s ease, box-shadow 0.3s ease;
        }

        textarea:focus {
            outline: none;
            border-color: var(--accent);
        }

        /* Full Screen Preview Overlay */
        #preview-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: var(--bg);
            z-index: 2000;
            display: flex;
            flex-direction: column;
            transform: translateY(100%);
            transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        #preview-overlay.active {
            transform: translateY(0);
        }

        .preview-header {
            padding: calc(env(safe-area-inset-top) + 16px) 20px 16px;
            background: var(--header-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border);
        }

        .preview-title {
            font-weight: 600;
            font-size: 18px;
        }

        iframe {
            flex: 1;
            width: 100%;
            border: none;
            background: #ffffff; /* Default white background for standard rendering */
        }

        /* SweetAlert2 iOS Tweaks */
        .swal2-popup {
            border-radius: 20px !important;
            background-color: var(--card) !important;
            color: var(--text) !important;
        }
        .swal2-title, .swal2-html-container {
            color: var(--text) !important;
        }
        .swal2-confirm {
            border-radius: 12px !important;
            background-color: var(--danger) !important;
        }
        .swal2-cancel {
            border-radius: 12px !important;
            background-color: transparent !important;
            color: var(--text) !important;
            border: 1px solid var(--border) !important;
        }

        @media (min-width: 768px) {
            main {
                flex-direction: row;
                height: calc(100vh - 80px);
            }
            .editor-section {
                flex: 1;
                height: 100%;
            }
            textarea {
                height: 100%;
                resize: none;
            }
        }
    </style>
</head>
<body>

    <!-- Splash Screen -->
    <div id="splash-screen">
        <div class="splash-title">CodeEditor Pro</div>
        <div class="loader">
            <span></span>
            <span></span>
            <span></span>
        </div>
    </div>

    <!-- Header -->
    <header>
        <div class="logo">CodeEditor Pro</div>
        <div class="header-actions">
            <button id="theme-btn" class="icon-btn" aria-label="Toggle Theme">
                <!-- Sun Icon -->
                <svg id="icon-sun" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" style="display: none;">
                    <path d="M12 2.25a.75.75 0 01.75.75v2.25a.75.75 0 01-1.5 0V3a.75.75 0 01.75-.75zM7.5 12a4.5 4.5 0 119 0 4.5 4.5 0 01-9 0zM18.894 6.166a.75.75 0 00-1.06-1.06l-1.591 1.59a.75.75 0 101.06 1.061l1.591-1.59zM21.75 12a.75.75 0 01-.75.75h-2.25a.75.75 0 010-1.5H21a.75.75 0 01.75.75zM17.834 18.894a.75.75 0 001.06-1.06l-1.59-1.591a.75.75 0 10-1.061 1.06l1.59 1.591zM12 18a.75.75 0 01.75.75V21a.75.75 0 01-1.5 0v-2.25A.75.75 0 0112 18zM7.758 17.303a.75.75 0 00-1.061-1.06l-1.591 1.59a.75.75 0 001.06 1.061l1.591-1.59zM6 12a.75.75 0 01-.75.75H3a.75.75 0 010-1.5h2.25A.75.75 0 016 12zM6.697 7.757a.75.75 0 001.06-1.06l-1.59-1.591a.75.75 0 00-1.061 1.06l1.59 1.591z"/>
                </svg>
                <!-- Moon Icon -->
                <svg id="icon-moon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                    <path fill-rule="evenodd" d="M9.528 1.718a.75.75 0 01.162.819A8.97 8.97 0 009 6a9 9 0 009 9 8.97 8.97 0 003.463-.69.75.75 0 01.981.98 10.503 10.503 0 01-9.694 6.46c-5.799 0-10.5-4.701-10.5-10.5 0-4.368 2.667-8.112 6.46-9.694a.75.75 0 01.818.162z" clip-rule="evenodd"/>
                </svg>
            </button>
            <button id="reset-btn" class="btn-secondary">Reset</button>
            <button id="run-btn" class="btn-primary">
                <svg style="width: 16px; height: 16px; margin-right: 4px; fill: #ffffff;" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
                Run
            </button>
        </div>
    </header>

    <!-- Editors -->
    <main>
        <div class="editor-section">
            <span class="editor-label">HTML Editor</span>
            <textarea id="html-code" spellcheck="false" placeholder="<!-- Write your HTML here -->"></textarea>
        </div>
        <div class="editor-section">
            <span class="editor-label">CSS Editor</span>
            <textarea id="css-code" spellcheck="false" placeholder="/* Write your CSS here */"></textarea>
        </div>
        <div class="editor-section">
            <span class="editor-label">JavaScript Editor</span>
            <textarea id="js-code" spellcheck="false" placeholder="// Write your JavaScript here"></textarea>
        </div>
    </main>

    <!-- Preview Overlay -->
    <div id="preview-overlay">
        <div class="preview-header">
            <span class="preview-title">Preview</span>
            <button id="close-preview-btn" class="btn-secondary">Close</button>
        </div>
        <iframe id="preview-frame" sandbox="allow-scripts allow-modals"></iframe>
    </div>

    <!-- Application Logic -->
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // --- PWA Setup (Manifest & Service Worker via Blob/DataURL) ---
            const setupPWA = () => {
                // Generate base64 Icon
                const svgIcon = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><rect width="100" height="100" rx="20" fill="#007aff"/><text x="50" y="65" font-size="40" font-family="-apple-system, sans-serif" font-weight="bold" fill="white" text-anchor="middle">&lt;/&gt;</text></svg>`;
                const encodedIcon = "data:image/svg+xml;base64," + btoa(svgIcon);

                // Inject Manifest
                const manifest = {
                    name: "CodeEditor Pro",
                    short_name: "Editor",
                    display: "standalone",
                    start_url: location.href,
                    theme_color: "#007aff",
                    background_color: "#ffffff",
                    icons: [
                        { src: encodedIcon, sizes: "192x192", type: "image/svg+xml", purpose: "any maskable" },
                        { src: encodedIcon, sizes: "512x512", type: "image/svg+xml", purpose: "any maskable" }
                    ]
                };
                const manifestLink = document.createElement('link');
                manifestLink.rel = 'manifest';
                manifestLink.href = 'data:application/manifest+json;charset=utf-8,' + encodeURIComponent(JSON.stringify(manifest));
                document.head.appendChild(manifestLink);

                // Inject Service Worker via Blob
                const swCode = `
                    self.addEventListener('install', e => self.skipWaiting());
                    self.addEventListener('activate', e => e.waitUntil(clients.claim()));
                    self.addEventListener('fetch', e => {
                        e.respondWith(
                            fetch(e.request).catch(() => new Response("CodeEditor Pro is offline, but fully functional!"))
                        );
                    });
                `;
                try {
                    if ('serviceWorker' in navigator && window.location.protocol !== 'file:') {
                        const blob = new Blob([swCode], { type: 'application/javascript' });
                        const swUrl = URL.createObjectURL(blob);
                        navigator.serviceWorker.register(swUrl).catch(err => console.warn('SW Register failed:', err));
                    }
                } catch (e) { console.warn('PWA SW skipped in local environment.'); }
            };

            setupPWA();

            // --- Splash Screen Logic ---
            const splashScreen = document.getElementById('splash-screen');
            setTimeout(() => {
                splashScreen.classList.add('hidden');
                setTimeout(() => splashScreen.style.display = 'none', 500);
            }, 1800);

            // --- Theme Logic ---
            const themeBtn = document.getElementById('theme-btn');
            const iconSun = document.getElementById('icon-sun');
            const iconMoon = document.getElementById('icon-moon');
            const metaTheme = document.getElementById('meta-theme-color');
            const root = document.documentElement;

            const updateThemeIcon = (theme) => {
                if(theme === 'dark') {
                    iconSun.style.display = 'block';
                    iconMoon.style.display = 'none';
                    metaTheme.setAttribute('content', '#000000');
                } else {
                    iconSun.style.display = 'none';
                    iconMoon.style.display = 'block';
                    metaTheme.setAttribute('content', '#ffffff');
                }
            };

            const savedTheme = localStorage.getItem('theme') || 'light';
            root.setAttribute('data-theme', savedTheme);
            updateThemeIcon(savedTheme);

            themeBtn.addEventListener('click', () => {
                const currentTheme = root.getAttribute('data-theme');
                const newTheme = currentTheme === 'light' ? 'dark' : 'light';
                root.setAttribute('data-theme', newTheme);
                localStorage.setItem('theme', newTheme);
                updateThemeIcon(newTheme);
            });

            // --- Editor & Preview Logic ---
            const htmlCode = document.getElementById('html-code');
            const cssCode = document.getElementById('css-code');
            const jsCode = document.getElementById('js-code');
            const runBtn = document.getElementById('run-btn');
            const resetBtn = document.getElementById('reset-btn');
            const previewOverlay = document.getElementById('preview-overlay');
            const closePreviewBtn = document.getElementById('close-preview-btn');
            const previewFrame = document.getElementById('preview-frame');

            const generatePreview = () => {
                const html = htmlCode.value;
                const css = cssCode.value;
                const js = jsCode.value;

                const combined = `
                    <!DOCTYPE html>
                    <html>
                    <head>
                        <meta charset="UTF-8">
                        <meta name="viewport" content="width=device-width, initial-scale=1.0">
                        <style>${css}</style>
                    </head>
                    <body>
                        ${html}
                        <script>
                            try {
                                ${js}
                            } catch(err) {
                                console.error(err);
                            }
                        <\/script>
                    </body>
                    </html>
                `;
                
                previewFrame.srcdoc = combined;
                previewOverlay.classList.add('active');
            };

            runBtn.addEventListener('click', generatePreview);

            closePreviewBtn.addEventListener('click', () => {
                previewOverlay.classList.remove('active');
                setTimeout(() => { previewFrame.srcdoc = ''; }, 400); // Clear memory after transition
            });

            // --- Reset Logic with SweetAlert2 ---
            resetBtn.addEventListener('click', () => {
                Swal.fire({
                    title: 'Reset Code?',
                    text: "This will clear all HTML, CSS, and JavaScript. This action cannot be undone.",
                    icon: 'warning',
                    showCancelButton: true,
                    confirmButtonText: 'Yes, Reset',
                    cancelButtonText: 'Cancel',
                    reverseButtons: true,
                    background: getComputedStyle(root).getPropertyValue('--card').trim(),
                    color: getComputedStyle(root).getPropertyValue('--text').trim()
                }).then((result) => {
                    if (result.isConfirmed) {
                        htmlCode.value = '';
                        cssCode.value = '';
                        jsCode.value = '';
                    }
                });
            });

            // Handle tabs in textareas
            const textareas = document.querySelectorAll('textarea');
            textareas.forEach(ta => {
                ta.addEventListener('keydown', function(e) {
                    if (e.key === 'Tab') {
                        e.preventDefault();
                        const start = this.selectionStart;
                        const end = this.selectionEnd;
                        this.value = this.value.substring(0, start) + "  " + this.value.substring(end);
                        this.selectionStart = this.selectionEnd = start + 2;
                    }
                });
            });
        });
    </script>
</body>
</html>
